name: Quick Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quick-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build project
        run: npm run build

      - name: Run build validation tests
        run: npm run test:build

      - name: Verify package-lock.json
        run: npm ci --dry-run

      - name: Check build size
        run: du -sh .next/ || echo "Build size check completed"

      # E2E tests are currently skipped
